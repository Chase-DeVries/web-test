<!DOCTYPE html>
<html lang="en">

<body class="content-frame">

  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Chase</title>
    <link rel="stylesheet" href="./styles/styles.css">
    <script src="https://unpkg.com/htmx.org@1.9.6"
      integrity="sha384-FhXw7b6AlE/jyjlZH5iHa/tTe9EpJ1Y55RjcgPbjeWMskSxZt1v9qkxLJWNJaGni"
      crossorigin="anonymous"></script>
  </head>
  <div hx-trigger="load" hx-get="/navbar" class="menu-bar"></div>
  <h1>Photo Gallery</h1>
  <div id="gallery" class="row">
    <script>
      function showMessage(text) {
        gallery.innerHTML = `<p class="paragraph">${text}</p>`;
      }

      async function fetchPhotos() {
        let data;
        try {
          const response = await fetch('https://storage.googleapis.com/storage/v1/b/chasedv-photos/o');
          if (!response.ok) {
            throw new Error(`bucket request failed: ${response.status}`);
          }
          data = await response.json();
        } catch (err) {
          console.error('failed to load photos', err);
          showMessage('Could not load photos right now. Please try again later.');
          return;
        }

        const items = (data && data.items) || [];
        const thumbnails = items.filter(item =>
          item && item.contentType == 'image/jpeg' && item.name.includes('-thumbs'));
        if (thumbnails.length === 0) {
          showMessage('No photos yet.');
          return;
        }

        const COLUMN_COUNT = 4;
        for (let i = 0; i < COLUMN_COUNT; i++) {
          const column = document.createElement('div');
          column.className = 'column';
          column.id = `column${i + 1}`;
          gallery.appendChild(column);
        }
        let imageCount = 0;
        async function recursiveRender(index) {
          if (index < thumbnails.length) {
            const thumbnail = thumbnails[index];
            const fullSize = items.find(item => item.name === thumbnail.name.replace('-thumbs', ''));
            const a = document.createElement("a");
            a.href = `https://storage.googleapis.com/${(fullSize || thumbnail).bucket}/${(fullSize || thumbnail).name}`;
            a.target = "_blank";
            const img = document.createElement('img');
            img.src = `https://storage.googleapis.com/${thumbnail.bucket}/${thumbnail.name}`;
            img.alt = thumbnail.name;
            img.onload = () => recursiveRender(index + 1);
            img.onerror = () => recursiveRender(index + 1);
            img.loading = 'lazy';
            const column = document.getElementById(`column${(imageCount % COLUMN_COUNT) + 1}`);
            a.appendChild(img);
            column.appendChild(a);
            imageCount++;
          }
        }
        recursiveRender(0);
      }

      fetchPhotos();
    </script>
  </div>
</body>

</html>
</div>
